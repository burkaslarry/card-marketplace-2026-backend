server:
  # Render and other PaaS set PORT; local default 8080
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: elite-trader-backend
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

logging:
  level:
    root: INFO
    com.elitetrader: DEBUG

elite-trader:
  cors:
    # Comma-separated; override in Docker: -e ELITE_TRADER_CORS_ALLOWED_ORIGINS="https://app.example.com"
    allowed-origins: ${ELITE_TRADER_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,https://elite-trader.vercel.app,https://card-marketplace-2026.vercel.app}
  demo-mode: true
